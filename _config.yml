# Site identity
title: Testimony Adekoya — ML Engineer & Researcher
url: "https://dev-tyta.github.io"
baseurl: ""

# Build settings
markdown: kramdown
kramdown:
  hard_wrap: false
  input: GFM
  syntax_highlighter: rouge
strict_front_matter: true

# Exclude from build output
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - bom_extraction_langgraph.py
  - pyproject.toml

# Include hidden files needed for GitHub Pages
include:
  - .nojekyll
