<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>(function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.setAttribute('data-theme','light')})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Testimony Adekoya</title>
  <meta name="description" content="Blog by Testimony Adekoya">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d; --bg-card: #141414; --border: rgba(255,255,255,0.07); --border-hover: rgba(255,255,255,0.18);
      --text: #f0f0f0; --text-2: #a3a3a3; --text-3: #5a5a5a;
      --blue: #3b82f6; --green: #10b981; --amber: #f59e0b;
      --grad: linear-gradient(135deg, #3b82f6, #10b981);
    }
    [data-theme="light"] {
      --bg: #f5f5f4; --bg-card: #ffffff; --border: rgba(0,0,0,0.08); --border-hover: rgba(0,0,0,0.22);
      --text: #111111; --text-2: #444444; --text-3: #888888;
    }
    [data-theme="light"] .nav-inner { background: rgba(245,245,244,0.88); }
    [data-theme="light"] #nav.scrolled .nav-inner { background: rgba(245,245,244,0.97); border-color: rgba(0,0,0,0.1); }
    [data-theme="light"] .nav-links { background: rgba(245,245,244,0.97); }
    [data-theme="light"] .nav-toggle span { background: var(--text); }
    [data-theme="light"] ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); }
    [data-theme="light"] .prose code { background: rgba(0,0,0,0.06); }
    [data-theme="light"] .prose pre { background: rgba(0,0,0,0.06); }
    [data-theme="light"] .prose blockquote { border-left-color: rgba(0,0,0,0.15); background: rgba(0,0,0,0.03); }

    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; font-size: 16px; line-height: 1.6; overflow-x: hidden; }

    #reading-progress { position: fixed; top: 0; left: 0; height: 2px; width: 0%; background: linear-gradient(90deg, #3b82f6, #10b981); z-index: 200; pointer-events: none; transition: width 0.1s linear; }

    /* NAV */
    #nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 16px 0; transition: padding 0.3s; }
    #nav.scrolled { padding: 10px 0; }
    .nav-inner { display: flex; align-items: center; justify-content: space-between; background: rgba(14,14,14,0.78); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px); border: 1px solid rgba(255,255,255,0.07); border-radius: 100px; padding: 7px 7px 7px 22px; transition: border-color 0.3s, background 0.3s; }
    #nav.scrolled .nav-inner { border-color: rgba(255,255,255,0.13); background: rgba(10,10,10,0.96); }
    .nav-brand { font-family: 'Archivo', sans-serif; font-size: 17px; font-weight: 700; color: var(--text); text-decoration: none; letter-spacing: -0.02em; display: flex; align-items: center; gap: 10px; }
    .nav-avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; object-position: center 15%; flex-shrink: 0; border: 1.5px solid rgba(255,255,255,0.12); transition: border-color 0.2s; }
    .nav-brand span { background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .nav-links { display: flex; align-items: center; gap: 28px; list-style: none; }
    .nav-links a { font-size: 14px; font-weight: 500; color: var(--text-2); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover,.nav-links a.active { color: var(--text); }
    .nav-cta { font-size: 13px; font-weight: 600; padding: 8px 18px; border-radius: 100px; background: var(--grad); color: #fff !important; text-decoration: none; transition: opacity 0.2s; }
    .nav-cta:hover { opacity: 0.85; }
    .theme-toggle { display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; border-radius: 50%; background: transparent; border: 1px solid var(--border); color: var(--text-2); cursor: pointer; transition: all 0.2s; flex-shrink: 0; margin-left: 4px; }
    .theme-toggle:hover { border-color: var(--border-hover); color: var(--text); }
    .theme-toggle svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .icon-moon { display: none; }
    [data-theme="light"] .icon-sun { display: none; }
    [data-theme="light"] .icon-moon { display: block; }
    .nav-toggle { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
    .nav-toggle span { display: block; width: 22px; height: 2px; background: var(--text); border-radius: 2px; transition: all 0.3s; }

    .divider { height: 1px; background: linear-gradient(90deg, transparent 0%, var(--border) 30%, var(--border) 70%, transparent 100%); }

    /* POST HERO */
    .post-hero { padding: 140px 0 56px; }
    .container { max-width: 720px; margin: 0 auto; padding: 0 24px; }
    .container-wide { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    .back-link { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 500; color: var(--text-3); text-decoration: none; margin-bottom: 28px; transition: color 0.2s; }
    .back-link:hover { color: var(--text-2); }
    .back-link svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .post-category { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--green); margin-bottom: 14px; }
    .post-title { font-family: 'Archivo', sans-serif; font-size: clamp(28px, 5vw, 46px); font-weight: 800; line-height: 1.1; letter-spacing: -0.03em; color: var(--text); margin-bottom: 16px; }
    .post-meta { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 20px; }
    .post-meta-item { font-size: 13px; color: var(--text-3); display: flex; align-items: center; gap: 5px; }
    .post-meta-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text-3); }
    .post-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 6px; background: rgba(59,130,246,0.1); color: var(--blue); border: 1px solid rgba(59,130,246,0.2); }
    .tag.gray { background: rgba(255,255,255,0.04); color: var(--text-2); border-color: var(--border); }
    [data-theme="light"] .tag.gray { background: rgba(0,0,0,0.04); }

    /* PROSE */
    .post-body { padding: 48px 0 100px; }
    .prose { font-family: 'Lora', Georgia, serif; font-size: 17px; line-height: 1.85; color: var(--text-2); }
    .prose h1, .prose h2, .prose h3, .prose h4 { font-family: 'Archivo', sans-serif; color: var(--text); letter-spacing: -0.02em; margin: 2em 0 0.6em; line-height: 1.2; }
    .prose h1 { font-size: 32px; font-weight: 800; }
    .prose h2 { font-size: 24px; font-weight: 800; }
    .prose h3 { font-size: 19px; font-weight: 700; }
    .prose p { margin-bottom: 1.4em; }
    .prose strong { color: var(--text); font-weight: 700; }
    .prose em { font-style: italic; }
    .prose a { color: var(--blue); text-decoration: underline; text-underline-offset: 3px; }
    .prose a:hover { opacity: 0.8; }
    .prose ul, .prose ol { margin: 1em 0 1.4em 1.5em; display: flex; flex-direction: column; gap: 6px; }
    .prose li { line-height: 1.7; }
    .prose code { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 14px; padding: 2px 6px; border-radius: 5px; background: rgba(255,255,255,0.08); color: var(--green); }
    .prose pre { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; overflow-x: auto; margin: 1.6em 0; }
    .prose pre code { background: none; color: var(--text-2); font-size: 13px; padding: 0; }
    .prose blockquote { border-left: 3px solid rgba(59,130,246,0.4); background: rgba(59,130,246,0.04); border-radius: 0 10px 10px 0; padding: 14px 20px; margin: 1.6em 0; }
    .prose blockquote p { margin: 0; color: var(--text-2); font-style: italic; }
    .prose hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }
    .prose table { width: 100%; border-collapse: collapse; margin: 1.6em 0; font-size: 14px; font-family: 'Space Grotesk', sans-serif; }
    .prose th { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); padding: 10px 14px; border-bottom: 1px solid var(--border); text-align: left; }
    .prose td { padding: 10px 14px; color: var(--text-2); border-bottom: 1px solid var(--border); }
    .prose tr:last-child td { border-bottom: none; }

    .post-footer { padding: 40px 0 80px; border-top: 1px solid var(--border); margin-top: 48px; }
    .back-to-blog { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--text-2); text-decoration: none; padding: 10px 18px; border: 1px solid var(--border); border-radius: 100px; transition: all 0.2s; }
    .back-to-blog:hover { border-color: var(--border-hover); color: var(--text); }
    .back-to-blog svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* Loading / error */
    .post-loading { padding: 160px 0; text-align: center; color: var(--text-3); font-size: 15px; }
    .post-spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer { border-top: 1px solid var(--border); padding: 32px 0; text-align: center; color: var(--text-3); font-size: 13px; }
    footer a { color: var(--text-3); text-decoration: none; }
    footer a:hover { color: var(--text-2); }
    :focus-visible { outline: 2px solid var(--blue); outline-offset: 3px; border-radius: 4px; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    @media (max-width: 640px) {
      .nav-links { display: none; flex-direction: column; position: fixed; top: 61px; left: 0; right: 0; background: rgba(13,13,13,0.97); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 24px; gap: 20px; border-bottom: 1px solid var(--border); z-index: 99; }
      .nav-links.open { display: flex; } .nav-toggle { display: flex; } .nav-inner { border-radius: 16px; padding: 10px 10px 10px 16px; }
      .prose { font-size: 16px; }
    }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
  </style>
</head>
<body>

<div id="reading-progress" role="progressbar" aria-hidden="true"></div>

<nav id="nav" aria-label="Primary navigation">
  <div class="container-wide">
    <div class="nav-inner">
      <a class="nav-brand" href="index.html">
        <img src="img/_DSC4243.JPG" alt="" class="nav-avatar" aria-hidden="true" loading="eager">
        Testimony <span>Adekoya</span>
      </a>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#experience">Experience</a></li>
        <li><a href="index.html#projects">Projects</a></li>
        <li><a href="index.html#research">Research</a></li>
        <li><a href="index.html#skills">Skills</a></li>
        <li><a href="blog.html" class="active">Blog</a></li>
        <li><a href="now.html">Now</a></li>
        <li><a href="index.html#contact">Contact</a></li>
        <li><a class="nav-cta" href="Testimony_Adekoya_Resume.pdf" target="_blank" rel="noopener">Download CV</a></li>
      </ul>
      <button id="theme-toggle" class="theme-toggle" aria-label="Switch to light mode">
        <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</nav>

<div id="post-container">
  <div class="post-loading">
    <div class="post-spinner" aria-hidden="true"></div>
    Loading post…
  </div>
</div>

<footer>
  <div class="container-wide">
    <p>Designed &amp; built by <a href="index.html">Testimony Adekoya</a> · Lagos, Nigeria · 2026</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
<script>
(function() {
  'use strict';

  const nav = document.getElementById('nav');
  const bar = document.getElementById('reading-progress');
  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 24);
    if (bar) {
      const docH = document.documentElement.scrollHeight - window.innerHeight;
      bar.style.width = (docH > 0 ? Math.min(100, window.scrollY / docH * 100) : 0) + '%';
    }
  }, { passive: true });

  const toggle = document.getElementById('nav-toggle');
  const navLinks = document.getElementById('nav-links');
  toggle.addEventListener('click', () => { const o = navLinks.classList.toggle('open'); toggle.setAttribute('aria-expanded', o); });
  navLinks.querySelectorAll('a').forEach(a => a.addEventListener('click', () => { navLinks.classList.remove('open'); toggle.setAttribute('aria-expanded', 'false'); }));

  const themeToggle = document.getElementById('theme-toggle');
  const html = document.documentElement;
  function applyTheme(t) {
    if (t === 'light') { html.setAttribute('data-theme','light'); themeToggle.setAttribute('aria-label','Switch to dark mode'); }
    else { html.removeAttribute('data-theme'); themeToggle.setAttribute('aria-label','Switch to light mode'); }
    localStorage.setItem('theme', t);
  }
  themeToggle.addEventListener('click', () => applyTheme(html.getAttribute('data-theme') === 'light' ? 'dark' : 'light'));

  // Load post
  const params = new URLSearchParams(location.search);
  const postId = params.get('post');

  async function loadPost() {
    const container = document.getElementById('post-container');
    if (!postId) { container.innerHTML = '<div class="post-loading">No post specified. <a href="blog.html" style="color:var(--blue)">← Back to blog</a></div>'; return; }

    try {
      const apiUrl = ['localhost','127.0.0.1'].includes(location.hostname)
        ? 'http://127.0.0.1:8000'
        : (localStorage.getItem('_blog_api') || '').replace(/\/$/, '');
      const res = await (apiUrl ? fetch(`${apiUrl}/posts`) : fetch('data/posts.json'));
      let posts = await res.json();
      if (!Array.isArray(posts)) posts = [];
      const post = posts.find(p => p.id === postId);

      if (!post) { container.innerHTML = '<div class="post-loading">Post not found. <a href="blog.html" style="color:var(--blue)">← Back to blog</a></div>'; return; }

      document.title = post.title + ' — Testimony Adekoya';
      document.querySelector('meta[name="description"]').setAttribute('content', post.excerpt || post.title);

      const tagsHtml = (post.tags || []).map(t => `<span class="tag gray">${esc(t)}</span>`).join('');
      const contentHtml = typeof marked !== 'undefined' ? marked.parse(post.content || '') : `<p>${esc(post.content)}</p>`;

      container.innerHTML = `
        <header class="post-hero">
          <div class="container">
            <a href="blog.html" class="back-link">
              <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
              All Posts
            </a>
            <div class="post-category">${esc(post.category || '')}</div>
            <h1 class="post-title">${esc(post.title)}</h1>
            <div class="post-meta">
              <span class="post-meta-item">${esc(formatDate(post.date))}</span>
              <span class="post-meta-dot" aria-hidden="true"></span>
              <span class="post-meta-item">${esc(post.readTime || '')}</span>
            </div>
            ${tagsHtml ? `<div class="post-tags">${tagsHtml}</div>` : ''}
          </div>
        </header>
        <div class="divider"></div>
        <main class="post-body">
          <div class="container">
            <article class="prose">${contentHtml}</article>
            <div class="post-footer">
              <a href="blog.html" class="back-to-blog">
                <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
                Back to Blog
              </a>
            </div>
          </div>
        </main>`;
    } catch (e) {
      container.innerHTML = `<div class="post-loading">Failed to load post. <a href="blog.html" style="color:var(--blue)">← Back to blog</a></div>`;
    }
  }

  function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function formatDate(d) { try { return new Date(d + 'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}); } catch(e) { return d; } }

  loadPost();
})();
</script>
<script src="js/chat.js" defer></script>
</body>
